<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>MedicineBank Initiative</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

:root {
--black: #0A0A0A;
--black-2: #111111;
--black-3: #1A1A1A;
--dark: #222222;
--mid: #444444;
--muted: #A1A1AA; /* Brighter muted color for better contrast */
--line: rgba(255,255,255,0.08);
--white: #FFFFFF;
--accent: #C8371A;
--primary-blue: #38BDF8;
}

html { scroll-behavior: smooth; }

body {
font-family: 'Inter', sans-serif;
background: var(--black);
color: var(--white);
overflow-x: hidden;
-webkit-font-smoothing: antialiased;
}

/* ─── HEADER ─── */
.header {
position: fixed;
top: 0; left: 0; right: 0;
z-index: 1000;
background: rgba(17, 17, 17, 0.95); /* Slight transparency */
backdrop-filter: blur(10px);
border-bottom: 1px solid var(--line);
}

.header-top {
display: flex;
align-items: center;
justify-content: space-between;
padding: 12px 20px;
}

.logo {
display: flex;
align-items: center;
gap: 12px;
text-decoration: none;
}

.logo-img {
width: 42px; 
height: auto;
display: block;
}

.logo-text {
font-size: 22px;
font-weight: 800;
color: var(--white);
letter-spacing: -0.5px;
}

.header-search {
display: flex;
align-items: center;
gap: 8px;
background: rgba(255,255,255,0.1);
border: 1px solid var(--line);
border-radius: 8px;
padding: 8px 14px;
flex: 1;
max-width: 200px;
}

.header-search input {
background: none;
border: none;
outline: none;
font-size: 13px;
color: var(--white);
width: 100%;
}

.header-nav {
display: flex;
border-top: 1px solid var(--line);
padding: 0 20px;
gap: 5px;
}

.nav-tab {
padding: 14px 16px;
font-size: 13px;
font-weight: 600;
color: var(--muted);
text-decoration: none;
transition: all 0.2s;
border-bottom: 2px solid transparent;
}

.nav-tab:hover {
color: var(--primary-blue);
}

.nav-tab.active {
color: var(--white);
border-bottom-color: var(--white);
}

/* ─── HERO ─── */
.hero {
position: relative;
min-height: 100vh;
display: flex;
flex-direction: column;
justify-content: center;
padding: 120px 24px 60px;
}

.hero-grid {
position: absolute;
inset: 0;
z-index: 0;
background-image:
linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
background-size: 50px 50px;
mask-image: radial-gradient(circle at center, black, transparent 80%);
}

.hero-content { position: relative; z-index: 2; max-width: 600px; margin: 0 auto; text-align: center;}

.hero-eyebrow {
font-size: 11px;
font-weight: 700;
letter-spacing: 0.2em;
text-transform: uppercase;
color: var(--primary-blue);
margin-bottom: 20px;
}

.hero-title {
font-size: 56px;
font-weight: 900;
line-height: 1.1;
margin-bottom: 24px;
}

.word-bank {
color: transparent;
-webkit-text-stroke: 2px rgba(255,255,255,0.8); /* Thickened outline */
}

.hero-sub {
font-size: 17px;
color: rgba(255,255,255,0.7);
margin-bottom: 40px;
text-shadow: 0 2px 10px rgba(0,0,0,0.5);
}

.hero-btns {
display: flex;
gap: 15px;
justify-content: center;
}

.btn-primary {
background: var(--white);
color: var(--black);
padding: 16px 32px;
border-radius: 6px;
font-weight: 700;
text-decoration: none;
transition: transform 0.2s;
}

.btn-secondary {
background: rgba(255,255,255,0.1);
color: var(--white);
padding: 16px 32px;
border-radius: 6px;
font-weight: 600;
text-decoration: none;
border: 1px solid rgba(255,255,255,0.2);
backdrop-filter: blur(5px);
}

/* Other styles remain consistent with your original structure... */
.reveal { opacity: 0; transform: translateY(20px); transition: 0.6s ease-out; }
.reveal.visible { opacity: 1; transform: translateY(0); }
</style>
</head>
<body>

<header class="header">
  <div class="header-top">
    <a href="#" class="logo">
      <img src="https://i.ibb.co/v66p89mP/image.png" alt="MBI Logo" class="logo-img">
      <span class="logo-text">MBI</span>
    </a>
    <div class="header-search">
      <input type="text" placeholder="Search resources...">
    </div>
  </div>
  <nav class="header-nav">
    <a href="#" class="nav-tab active">Home</a>
    <a href="#about" class="nav-tab">About</a>
    <a href="#sectors" class="nav-tab">Sectors</a>
    <a href="#" class="nav-tab">Structure</a>
  </nav>
</header>

<section class="hero">
  <div class="hero-grid"></div>
  <div class="hero-content">
    <div class="hero-eyebrow reveal">Student-Driven • Egypt & Arab Region</div>
    <h1 class="hero-title reveal">Medicine<span class="word-bank">Bank</span><br>Initiative</h1>
    <p class="hero-sub reveal">Empowering students through academic excellence, research innovation, and global connectivity.</p>
    <div class="hero-btns reveal">
      <a href="#sectors" class="btn-primary">Explore Sectors</a>
      <a href="#about" class="btn-secondary">Learn More</a>
    </div>
  </div>
</section>

<script>
// Intersection Observer for Reveal
const observer = new IntersectionObserver((entries) => {
  entries.forEach(entry => {
    if (entry.isIntersecting) entry.target.classList.add('visible');
  });
}, { threshold: 0.1 });

document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
</script>

</body>
</html>
